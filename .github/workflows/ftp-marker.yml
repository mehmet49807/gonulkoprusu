name: FTP Marker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  marker:
    runs-on: ubuntu-latest
    steps:
      - name: Write FTP marker files
        env:
          FTP_HOST: ${{ secrets.FTP_PUBLIC_SERVER || secrets.FTP_SERVER || 'ftp.gonulkoprusu.com' }}
          FTP_USER: ${{ secrets.FTP_PUBLIC_USERNAME || secrets.FTP_USERNAME || 'cursor@gonulkoprusu.com' }}
          FTP_PASS: ${{ secrets.FTP_PUBLIC_PASSWORD || secrets.FTP_PASSWORD }}
        run: |
          python3 <<'PY'
          from ftplib import FTP
          from io import BytesIO
          import os

          marker = b"cursor-ai-menu-marker-20260615\n"
          candidates = [
              "/",
              "/admin.gonulkoprusu.com",
              "/public_html",
              "/public_html/admin",
              "/public_html/admin.gonulkoprusu.com",
              "/public_html/public",
          ]

          with FTP(os.environ["FTP_HOST"], timeout=30) as ftp:
              ftp.login(os.environ["FTP_USER"], os.environ["FTP_PASS"])
              for path in candidates:
                  try:
                      ftp.cwd(path)
                      ftp.storbinary("STOR cursor-ai-marker.txt", BytesIO(marker))
                      print(f"MARKER {path}")
                  except Exception as exc:
                      print(f"SKIP {path}: {exc}")
          PY
