name: FTP Diagnose

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect FTP directories
        env:
          FTP_HOST: ${{ secrets.FTP_PUBLIC_SERVER || secrets.FTP_SERVER || 'ftp.gonulkoprusu.com' }}
          FTP_USER: ${{ secrets.FTP_PUBLIC_USERNAME || secrets.FTP_USERNAME || 'cursor@gonulkoprusu.com' }}
          FTP_PASS: ${{ secrets.FTP_PUBLIC_PASSWORD || secrets.FTP_PASSWORD }}
        run: |
          python3 <<'PY'
          from ftplib import FTP
          import os

          host = os.environ["FTP_HOST"]
          user = os.environ["FTP_USER"]
          password = os.environ["FTP_PASS"]

          paths = [
              ".",
              "/",
              "public_html",
              "/public_html",
              "admin.gonulkoprusu.com",
              "/admin.gonulkoprusu.com",
              "domains",
              "/domains",
          ]

          with FTP(host, timeout=30) as ftp:
              ftp.login(user, password)
              print(f"connected={host}")
              print(f"pwd={ftp.pwd()}")
              for path in paths:
                  try:
                      ftp.cwd(path)
                      current = ftp.pwd()
                      names = ftp.nlst()
                      preview = ", ".join(names[:25])
                      print(f"LIST {path} -> {current}: {preview}")
                      ftp.cwd("/")
                  except Exception as exc:
                      print(f"ERR {path}: {exc}")
          PY
