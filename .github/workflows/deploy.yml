name: Deploy (FTP)

# gonulkoprusu.com (web sitesi) ve admin.gonulkoprusu.com (yönetici paneli)
# her main push'unda otomatik olarak FTP ile yüklenir.
# Kimlik bilgileri GitHub Secrets'tan okunur (repoda PAROLA SAKLANMAZ).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy-website:
    name: Web sitesi -> /public_html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (public)
        run: npm run build --workspace client
        env:
          VITE_APP_TARGET: public
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_PUBLIC_SERVER || secrets.FTP_SERVER || 'ftp.gonulkoprusu.com' }}
          username: ${{ secrets.FTP_PUBLIC_USERNAME || secrets.FTP_USERNAME || 'cursor@gonulkoprusu.com' }}
          password: ${{ secrets.FTP_PUBLIC_PASSWORD || secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./client/dist/
          server-dir: public_html/

  deploy-admin:
    name: Yönetici paneli -> /admin.gonulkoprusu.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (admin)
        run: npm run build --workspace client
        env:
          VITE_APP_TARGET: admin
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: Prefer React admin entry
        run: |
          cp client/dist/index.html client/dist/index.php
          cat > client/dist/.htaccess <<'EOF'
          DirectoryIndex index.html index.php

          <IfModule mod_rewrite.c>
          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_ADMIN_SERVER || secrets.FTP_SERVER || 'ftp.gonulkoprusu.com' }}
          username: ${{ secrets.FTP_ADMIN_USERNAME || secrets.FTP_USERNAME || 'cursor@gonulkoprusu.com' }}
          password: ${{ secrets.FTP_PUBLIC_PASSWORD || secrets.FTP_ADMIN_PASSWORD || secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./client/dist/
          server-dir: ./

      - name: Verify admin FTP files
        env:
          FTP_HOST: ${{ secrets.FTP_ADMIN_SERVER || secrets.FTP_SERVER || 'ftp.gonulkoprusu.com' }}
          FTP_USER: ${{ secrets.FTP_ADMIN_USERNAME || secrets.FTP_USERNAME || 'cursor@gonulkoprusu.com' }}
          FTP_PASS: ${{ secrets.FTP_PUBLIC_PASSWORD || secrets.FTP_ADMIN_PASSWORD || secrets.FTP_PASSWORD }}
        run: |
          python3 <<'PY'
          from ftplib import FTP
          import os

          with FTP(os.environ["FTP_HOST"], timeout=30) as ftp:
              ftp.login(os.environ["FTP_USER"], os.environ["FTP_PASS"])
              names = ftp.nlst()
              print("admin_ftp_pwd=" + ftp.pwd())
              print("admin_ftp_has_index_html=" + str("index.html" in names))
              print("admin_ftp_has_htaccess=" + str(".htaccess" in names))
              print("admin_ftp_preview=" + ", ".join(names[:30]))
          PY
